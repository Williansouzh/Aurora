services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]
  api:
    build: ./src
    environment:
      - ASPNETCORE_URLS=http://+:8080
    ports: ["8080:8080"]
    depends_on: [mongodb,redis]
  client:
    build: ./client
    ports: ["5173:5173"]
    depends_on: [api]
