name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore src/Aurora.API/Aurora.API.csproj

      - name: Build
        run: dotnet build src/Aurora.API/Aurora.API.csproj --no-restore --configuration Release

      - name: Unit and architecture tests
        run: dotnet test tests/Aurora.Tests/Aurora.Tests.csproj --no-restore --filter "Category!=Integration" --logger "github;verbosity=summary"

      - name: Integration tests
        run: dotnet test tests/Aurora.Tests/Aurora.Tests.csproj --no-restore --filter "Category=Integration" --logger "github;verbosity=summary"
        env:
          RUN_INTEGRATION_TESTS: "true"

  frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

      - name: Audit
        run: npm audit --audit-level=high

  e2e:
    name: E2E — Docker Compose
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Start stack
        working-directory: .
        run: docker compose up -d --build

      - name: Wait for API
        working-directory: .
        run: |
          for i in {1..60}; do
            curl -fsS http://localhost:8080/health && exit 0
            sleep 2
          done
          docker compose logs api
          exit 1

      - name: Run E2E
        run: npm run e2e
