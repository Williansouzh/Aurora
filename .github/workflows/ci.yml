name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.x'

      - name: Restore
        run: dotnet restore src/Aurora.API/Aurora.API.csproj

      - name: Build
        run: dotnet build src/Aurora.API/Aurora.API.csproj --no-restore --configuration Release

      - name: Test
        run: dotnet test tests/Aurora.Tests/Aurora.Tests.csproj --no-restore --logger "github;verbosity=summary"

  frontend:
    name: Frontend — Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
